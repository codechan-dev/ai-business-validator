version: '3.8'

services:
  # Nginx reverse proxy - main entry point
  nginx:
    image: nginx:alpine
    container_name: ai-validator-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - api
    networks:
      - ai-validator-network

  # Frontend - React/Vite application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai-validator-frontend
    environment:
      - VITE_API_URL=/api
    networks:
      - ai-validator-network

  # Backend API - FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-validator-api
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - .:/app
    networks:
      - ai-validator-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # MCP Server - Model Context Protocol
  mcp-server:
    build: .
    container_name: ai-validator-mcp
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - .:/app
    command: python -m mcp_server.server
    networks:
      - ai-validator-network

networks:
  ai-validator-network:
    driver: bridge
