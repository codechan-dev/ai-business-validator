version: '3.8'

services:
  api:
    build: .
    container_name: ai-validator-api
    ports:
      - "8001:8001"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - .:/app
    command: python -m app.main
    networks:
      - ai-validator-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  ui:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai-validator-ui
    ports:
      - "5173:5173"
    environment:
      - REACT_APP_API_URL=http://localhost:8001
    depends_on:
      - api
    networks:
      - ai-validator-network

  mcp-server:
    build: .
    container_name: ai-validator-mcp
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - .:/app
    command: python -m mcp_server.server
    networks:
      - ai-validator-network

networks:
  ai-validator-network:
    driver: bridge
